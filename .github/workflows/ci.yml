name: IntelliDoc CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr libtesseract-dev poppler-utils

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check for Syntax Errors
      run: |
        python -m py_compile app.py
        python -m py_compile backend/app.py

    - name: Verify Flask App Startup
      env:
        GITHUB_ACTIONS: true
        SECRET_KEY: ci-test-key
      run: |
        python -c "from app import app; print('✅ Root Flask app loaded successfully')"
        python -c "from backend.app import app; print('✅ Backend Flask app loaded successfully')"

    - name: Success Message
      run: echo "Build Passed! IntelliDoc is ready for deployment."
