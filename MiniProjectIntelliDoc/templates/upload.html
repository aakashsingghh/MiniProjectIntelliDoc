<!DOCTYPE html>
<html>
<head>
    <title>IDP Platform - Upload Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
        }

        h2 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #777;
            font-size: 14px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Intelligent Document Processing</h2>
        <p>Upload your document to begin automated processing</p>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="document" required>
            <br>
            <button type="submit">Upload Document</button>
        </form>

        <div class="footer">
            Mini Project - Enterprise Automation Platform
        </div>
    </div>

</body>
</html>
