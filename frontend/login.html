<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IntelliDoc</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
        }
        .login-card {
            background-color: var(--card-dark);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        body.light-mode .login-card {
            background-color: var(--card-light);
            border-color: var(--border-color-light);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group input {
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body class="animate-fade-in">
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Neon background glow effect -->
            <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: radial-gradient(circle, rgba(124, 58, 237, 0.3) 0%, transparent 70%); border-radius: 50%; pointer-events: none;"></div>
            
            <div style="text-align: center; margin-bottom: 1rem; color: var(--accent-purple); font-size: 2.5rem; text-shadow: 0 0 15px var(--accent-purple-glow);">
                <i class="fa-solid fa-cube"></i>
            </div>
            
            <h2 class="login-title">IntelliDoc</h2>
            <p class="login-subtitle">Sign in to your intelligent workspace</p>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div style="background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); color: #f87171; padding: 0.8rem; border-radius: 8px; font-size: 0.85rem; text-align: center; margin-bottom: 1.5rem;">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <input type="text" name="username" class="form-control-custom" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" class="form-control-custom" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem; font-size: 1rem; margin-top: 1rem;">Sign In</button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-secondary);">
                Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent-purple); font-weight: 500;">Create one</a>
            </div>
            
            <!-- Absolute Theme Toggle positioned at bottom left -->
            <div style="position: absolute; bottom: 20px; right: 20px;">
                <div class="theme-switch-container" onclick="toggleTheme()" style="margin: 0; transform: scale(0.8); transform-origin: right bottom;">
                    <div class="theme-switch">
                        <span class="theme-switch-text" id="themeText">Dark</span>
                        <div class="theme-switch-thumb" id="themeThumb">
                            <i class="fa-solid fa-moon theme-switch-icon" id="themeIcon"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const isLight = body.classList.toggle('light-mode');
            const themeText = document.getElementById('themeText');
            const themeIcon = document.getElementById('themeIcon');
            
            if (isLight) {
                themeText.textContent = "Light";
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('theme', 'light');
            } else {
                themeText.textContent = "Dark";
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('themeText').textContent = "Light";
            const icon = document.getElementById('themeIcon');
            icon.classList.remove('fa-moon');
            icon.classList.add('fa-sun');
        }
    </script>
</body>
</html>
